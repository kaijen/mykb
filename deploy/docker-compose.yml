# Abfrage-Seite (VPS): Traefik (TLS/ACME) + Authelia (Forward-Auth, 2FA) vor dem
# MCP-Server. Der Index (lance) kommt per rsync vom Laptop (siehe sync-Service in
# docker-compose.laptop.yml). GERÜST — vor Produktivbetrieb anpassen:
#   - DOMAIN und ACME-E-Mail setzen (deploy/.env)
#   - Authelia-Config und Secrets befüllen (siehe deploy/authelia/)
#   - rsync-Zielpfad = das hier gemountete ../data/lance
#
# Secrets kommen über Docker Secrets / .env, NIE ins Repo.
#
#   docker compose -f deploy/docker-compose.yml up -d --build

x-domain: &domain "${DOMAIN:-mykb.example.com}"

services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP -> HTTPS erzwingen (TLS erzwingen, siehe CLAUDE.md).
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  authelia:
    image: authelia/authelia:4.38
    restart: unless-stopped
    volumes:
      - "./authelia:/config"
    environment:
      - "TZ=Europe/Berlin"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authelia.rule=Host(`auth.${DOMAIN:-rag.example.com}`)"
      - "traefik.http.routers.authelia.entrypoints=websecure"
      - "traefik.http.routers.authelia.tls.certresolver=le"
      - "traefik.http.services.authelia.loadbalancer.server.port=9091"
      # Forward-Auth-Middleware, die der MCP-Router unten referenziert.
      - "traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/verify?rd=https://auth.${DOMAIN:-rag.example.com}"
      - "traefik.http.middlewares.authelia.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email"

  mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      - "LANCE_DB_PATH=/data/lance"
      # Abfrageseite: reine CPU-Inferenz (Query-Embedding) genügt.
      - "EMBED_DEVICE=cpu"
      - "MCP_HOST=0.0.0.0"
      - "MCP_PORT=8000"
      # EMBED_DIM muss zum Laptop passen, falls dort gekürzt wurde.
      - "EMBED_DIM=${EMBED_DIM:-}"
    volumes:
      # Nur der Index (rsync-Ziel, read-only) und der Modell-Cache.
      - "../data/lance:/data/lance:ro"
      - "./model-cache:/cache"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcp.rule=Host(`${DOMAIN:-rag.example.com}`)"
      - "traefik.http.routers.mcp.entrypoints=websecure"
      - "traefik.http.routers.mcp.tls.certresolver=le"
      - "traefik.http.routers.mcp.middlewares=authelia@docker"
      - "traefik.http.services.mcp.loadbalancer.server.port=8000"

  # Immer-erreichbarer Queue-Intake (Puffer für Laptop-Ausfall). Nimmt Übergaben
  # entgegen und reiht sie durabel ein; der Laptop zieht die Queue per rsync
  # (QUEUE_PULL_SOURCE -> diese ../data/queue) und verarbeitet sie.
  # Bewusst NICHT über Traefik/Authelia, sondern im Tailnet: 'tailscale serve --bg 8765'.
  capture:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "mykb", "capture"]
    environment:
      - "CAPTURE_MODE=queue"
      - "CAPTURE_HOST=0.0.0.0"
      - "CAPTURE_PORT=8765"
      - "QUEUE_DIR=/queue"
      # Für GET /status (Bestände); Index ist hier read-only vorhanden.
      - "LANCE_DB_PATH=/data/lance"
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - "../data/queue:/queue"
      - "../data/lance:/data/lance:ro"
