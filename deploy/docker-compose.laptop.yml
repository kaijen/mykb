# Erstellen-Seite (Laptop). Ziel: am Host nur Docker + NVIDIA Container Toolkit.
#
#   docker compose -f deploy/docker-compose.laptop.yml up -d --build
#
# Variablen in deploy/.env setzen (siehe deploy/.env.example). Den Capture-Dienst
# anschließend im Tailnet veröffentlichen:  tailscale serve --bg 8765

services:
  # Erfassen von unterwegs (CPU), direct-Modus: schreibt direkt in Inbox/Linkwarden.
  # Für Ausfallsicherheit läuft der Annahmepunkt besser als Queue-Intake auf dem
  # VPS (siehe docker-compose.yml) — dann ist dieser lokale capture optional und
  # nur „lowest latency, wenn du am Laptop bist". Lauscht auf 0.0.0.0, gemappt an
  # Host-localhost; Tailnet-Freigabe via 'tailscale serve'.
  capture:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.cuda
    image: mykb:cuda
    restart: unless-stopped
    command: ["python", "-m", "mykb", "capture"]
    environment:
      - CAPTURE_HOST=0.0.0.0
      - CAPTURE_PORT=8765
      - LINKWARDEN_URL=http://linkwarden:3000
      - LINKWARDEN_TOKEN=${LINKWARDEN_TOKEN:-}
      - SOURCE_DOCS_PATH=/data/documents
      - NOTES_PATH=/data/notes
      - STATE_DIR=/state
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ../data/documents:/data/documents
      - ../data/notes:/data/notes
      - state:/state          # Trigger-Datei für den Scheduler
    depends_on:
      - linkwarden

  # Ereignisgesteuerte Verarbeitung auf der GPU: reagiert auf den Capture-Trigger
  # (debounced) bzw. das Fallback-Intervall, verarbeitet die Inbox (idempotent
  # über content_hash) und spiegelt den Index DIREKT danach per rsync zum VPS.
  scheduler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.cuda
    image: mykb:cuda
    restart: unless-stopped
    command: ["python", "-m", "mykb", "watch"]
    environment:
      - STATE_DIR=/state
      - PROCESS_DEBOUNCE=${PROCESS_DEBOUNCE:-30}
      - PROCESS_INTERVAL=${PROCESS_INTERVAL:-3600}
      - WATCH_POLL=${WATCH_POLL:-5}
      - EMBED_DEVICE=cuda
      - LANCE_DB_PATH=/data/lance
      - SOURCE_DOCS_PATH=/data/documents
      - NOTES_PATH=/data/notes
      - ENRICH=${ENRICH:-1}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - LINKWARDEN_URL=http://linkwarden:3000
      - LINKWARDEN_TOKEN=${LINKWARDEN_TOKEN:-}
      # Sync direkt nach jedem Lauf (leer = aus).
      - VPS_SSH_TARGET=${VPS_SSH_TARGET:-}
      - SSH_KEY=/key
      # Queue vom VPS ziehen (Puffer für Laptop-Ausfall). Leer = aus.
      - QUEUE_DIR=/state/queue
      - QUEUE_PULL_SOURCE=${QUEUE_PULL_SOURCE:-}
      - QUEUE_POLL=${QUEUE_POLL:-60}
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ../data/documents:/data/documents:ro
      - ../data/notes:/data/notes:ro
      - ../data/lance:/data/lance
      - hf_cache:/cache
      - state:/state                 # Trigger-Datei (von capture gesetzt)
      - ${SSH_KEY:-/dev/null}:/key:ro  # SSH-Key für den rsync-Sync
    depends_on:
      - ollama
      - linkwarden
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Lokaler LLM für die KI-Anreicherung (CPU). Modell einmalig ziehen:
  #   docker compose -f deploy/docker-compose.laptop.yml exec ollama ollama pull llama3.2
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama

  # Bookmark-Frontend. capture legt Links hier ab; scheduler zieht sie per sync.
  linkwarden:
    image: ghcr.io/linkwarden/linkwarden:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/postgres
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-changeme}
      - NEXTAUTH_URL=${LINKWARDEN_NEXTAUTH_URL:-http://localhost:3000}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - linkwarden_data:/data/data
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Hinweis: Der frühere separate rsync-Sidecar entfällt — der Sync läuft jetzt
  # im scheduler direkt nach jedem 'process'-Lauf (nie mitten in einen
  # Schreibvorgang). VPS_SSH_TARGET + SSH_KEY siehe scheduler.

volumes:
  hf_cache:
  ollama_models:
  linkwarden_data:
  pgdata:
  state:
