name: docs

# Veröffentlicht die MkDocs-Dokumentation versioniert (mike) nach gh-pages,
# sobald ein Versions-Tag (v*) gepusht wird. Es wird zusätzlich geprüft, dass
# der Tag auf main liegt — nur dann wird deployt.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # mike pusht den gebauten Stand nach gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (volle Historie für mike + main-Prüfung)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sicherstellen, dass der Tag auf main liegt
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} zeigt nicht auf einen Commit aus main — kein Deploy."
            exit 1
          fi

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Doku-Abhängigkeiten installieren
        run: pip install -r docs/requirements.txt

      - name: Git für mike konfigurieren
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: gh-pages holen (falls vorhanden)
        run: git fetch origin gh-pages --depth=1 || true

      - name: Version mit mike deployen
        run: |
          # Volle Version aus dem Tag als Doku-Version (v0.1.0 -> 0.1.0),
          # Alias "latest". Nur das führende "v" wird entfernt.
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Deploye Doku-Version ${VERSION} (aus Tag ${GITHUB_REF_NAME})"
          mike deploy --push --update-aliases "${VERSION}" latest
          mike set-default --push latest
