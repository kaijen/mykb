[tool.ruff]
line-length = 90
target-version = "py311"

[tool.ruff.lint]
# Standard-Auswahl plus Import-Sortierung.
select = ["E", "F", "I", "W", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# Tests dürfen lockerer sein: ungenutzte Fixtures-Argumente, lange Asserts,
# Asserts selbst (kein Bandit hier) und Re-Imports innerhalb von Funktionen.
"tests/**" = ["E501", "B011", "F811", "F401"]
# FastAPI-Idiom: File()/Form()/Header() als Parameter-Defaults sind gewollt
# und vom Framework so vorgesehen (B008 wäre hier ein False Positive).
"mykb/capture.py" = ["B008"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
