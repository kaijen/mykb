site_name: mykb — persönlicher Wissensspeicher
site_description: >-
  Selbst gehosteter PKM-Speicher: Dokumente, Notizen, Web-Inhalte und eine
  Linksammlung, semantisch durchsuchbar über einen MCP-Server.
site_author: Kai Jendrian
# Wird über GitHub Pages veröffentlicht.
site_url: https://kaijen.github.io/mykb/

repo_name: kaijen/mykb
repo_url: https://github.com/kaijen/mykb
edit_uri: edit/main/docs/

theme:
  name: material
  language: de
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Auf dunkles Design umschalten
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Auf helles Design umschalten

extra:
  # Versionsauswahl für die mike-Versionierung.
  version:
    provider: mike
    default: latest

plugins:
  - search:
      lang: de

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  # Mermaid-Diagramme: ```mermaid wird als Diagramm gerendert (Material bündelt
  # mermaid.js). Muss als custom_fence unter superfences stehen.
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Überblick: index.md
  - Installation: installation.md
  - Inhalte erfassen: erfassen.md
  - Von unterwegs erfassen: capture.md
  - Linksammlung: links.md
  - KI-Features: ki-features.md
  - MCP-Server: mcp-server.md
  - Konfiguration: konfiguration.md
  - Deployment: deployment.md
  - Architektur & Modelle: architektur.md
